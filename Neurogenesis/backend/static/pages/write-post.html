<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>写帖子 - 神经发生 Neurogenesis</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body data-page="write-post">
<div id="nav-root"></div>
<div class="container">
  <div class="page-header">
    <h1>写帖子</h1>
    <p>分享你的文艺见闻与感受</p>
  </div>
  <div class="post-card" style="max-width:640px;">
    <div style="margin-bottom:20px;">
      <label style="display:block;font-size:14px;font-weight:600;margin-bottom:8px;">内容</label>
      <textarea id="post-content" rows="6" placeholder="写下你想分享的..." style="width:100%;padding:12px 14px;font-family:inherit;font-size:15px;border:1px solid var(--border);border-radius:var(--radius-sm);resize:vertical;"></textarea>
    </div>
    <div style="margin-bottom:20px;">
      <label style="display:block;font-size:14px;font-weight:600;margin-bottom:8px;">配图</label>
      <input type="file" id="post-image" accept="image/*" style="display:none;" onchange="previewImage(this)">
      <button class="btn-small" onclick="document.getElementById('post-image').click()">选择图片</button>
      <div id="image-preview" style="margin-top:12px;display:none;">
        <img src="" style="max-width:100%;max-height:300px;border-radius:var(--radius-sm);object-fit:cover;">
        <button class="btn-small" style="margin-top:8px;color:#c33;" onclick="clearImage()">删除图片</button>
      </div>
    </div>
    <div style="margin-bottom:20px;">
      <label style="display:block;font-size:14px;font-weight:600;margin-bottom:8px;">标签（用逗号分隔）</label>
      <input type="text" id="post-tags" class="text-sm" style="width:100%;padding:10px 14px;" placeholder="电影, 音乐, 读书">
    </div>
    <div style="display:flex;gap:12px;">
      <button class="btn-small primary" onclick="submitPost()">发布</button>
      <button class="btn-small" onclick="location.href='/static/pages/community.html'">取消</button>
    </div>
  </div>
</div>
<script src="/static/js/api.js"></script>
<script src="/static/js/auth.js"></script>
<script src="/static/js/ui.js"></script>
<script>
let uploadedImageUrl = null;

function previewImage(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const preview = document.getElementById('image-preview');
    preview.querySelector('img').src = e.target.result;
    preview.style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function clearImage() {
  document.getElementById('post-image').value = '';
  document.getElementById('image-preview').style.display = 'none';
  uploadedImageUrl = null;
}

async function submitPost() {
  const content = document.getElementById('post-content').value.trim();
  if (!content) {
    showToast('请填写内容', 'error');
    return;
  }

  const fileInput = document.getElementById('post-image');
  if (fileInput.files[0] && !uploadedImageUrl) {
    const formData = new FormData();
    formData.append('file', fileInput.files[0]);
    try {
      const res = await fetch('/api/posts/upload-image', {
        method: 'POST',
        credentials: 'same-origin',
        body: formData,
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || '上传失败');
      uploadedImageUrl = data.image_url;
    } catch (err) {
      showToast('图片上传失败：' + err.message, 'error');
      return;
    }
  }

  const tagsStr = document.getElementById('post-tags').value.trim();
  const tags = tagsStr ? tagsStr.split(/[,，]/).map(t => t.trim()).filter(Boolean) : [];

  try {
    await post('/api/posts', {
      content,
      tags,
      image_url: uploadedImageUrl,
    });
    showToast('发布成功', 'success');
    location.href = '/static/pages/community.html';
  } catch (err) {
    showToast('发布失败：' + err.message, 'error');
  }
}
</script>
</body>
</html>
