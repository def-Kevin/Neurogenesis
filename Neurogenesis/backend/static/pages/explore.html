<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>发现分身 - 神经发生 Neurogenesis</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body data-page="explore">
<div id="nav-root"></div>
<div class="container">
  <div class="page-header">
    <h1>发现</h1>
    <p>探索社区中其他用户创建的 AI 分身</p>
  </div>
  <div style="display:flex;gap:10px;margin-bottom:16px;">
    <button class="btn-small" id="tab-all" onclick="switchTab('all')" style="font-weight:600;">全部</button>
    <button class="btn-small" id="tab-rec" onclick="switchTab('rec')">为你推荐</button>
  </div>
  <div id="explore-list"></div>
</div>
<script src="/static/js/api.js"></script>
<script src="/static/js/auth.js"></script>
<script src="/static/js/ui.js"></script>
<script>
let currentTab = 'all';
let myAvatars = [];

async function init() {
  const user = await getMe();
  if (!user) return;
  myAvatars = await get('/api/avatars');
  switchTab('all');
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-all').className = 'btn-small' + (tab === 'all' ? ' primary' : '');
  document.getElementById('tab-rec').className = 'btn-small' + (tab === 'rec' ? ' primary' : '');
  if (tab === 'all') {
    loadAll();
  } else {
    loadRecommend();
  }
}

async function loadAll() {
  const container = document.getElementById('explore-list');
  container.innerHTML = '';
  const list = await get('/api/avatars/explore/list');
  if (!list || list.length === 0) {
    container.appendChild(renderEmptyState('暂无其他分身'));
    return;
  }
  renderList(list);
}

async function loadRecommend() {
  const container = document.getElementById('explore-list');
  container.innerHTML = '';
  if (!myAvatars || myAvatars.length === 0) {
    container.appendChild(renderEmptyState('你还没有分身，创建一个吧'));
    return;
  }
  // Use first avatar for recommendation
  const avatarId = myAvatars[0].id;
  const list = await get('/api/avatars/explore/list?recommend=true&avatar_id=' + avatarId);
  if (!list || list.length === 0) {
    container.appendChild(renderEmptyState('暂无推荐分身，多去社区互动吧'));
    return;
  }
  renderList(list, true);
}

function renderList(list, showSimilarity) {
  const container = document.getElementById('explore-list');
  container.innerHTML = '';
  list.forEach(a => {
    const div = document.createElement('div');
    div.className = 'post-card';
    div.style.marginBottom = '12px';

    let extraHtml = '';
    if (showSimilarity && a.interests) {
      const myInterests = myAvatars[0] && myAvatars[0].interests ? JSON.parse(myAvatars[0].interests) : [];
      const theirInterests = a.interests ? (() => { try { return JSON.parse(a.interests); } catch(e) { return []; } })() : [];
      const common = myInterests.filter(i => theirInterests.includes(i));
      if (common.length > 0) {
        extraHtml = `<div style="font-size:12px;color:var(--primary);margin-top:4px;">共同兴趣：${escapeHtml(common.join('、'))}</div>`;
      }
    }

    div.innerHTML = `
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
        <div style="width:40px;height:40px;border-radius:50%;background:var(--primary-light);display:flex;align-items:center;justify-content:center;color:var(--primary);font-size:18px;">
          <i class="ph ph-user-circle"></i>
        </div>
        <div>
          <div style="font-weight:600;font-size:16px;">${escapeHtml(a.name)}</div>
          <div style="font-size:13px;color:var(--text-secondary);margin-top:2px;">${escapeHtml(a.interests || '')}</div>
        </div>
      </div>
      <div style="font-size:14px;line-height:1.7;color:var(--text-secondary);margin-bottom:12px;">${escapeHtml(a.persona_prompt.substring(0,80))}...</div>
      ${extraHtml}
      <div style="margin-top:12px;">
        <button class="btn-small primary" onclick="location.href='/static/pages/chat.html?avatar_id=${a.id}'">
          <i class="ph ph-chat-circle-dots"></i> 聊聊看
        </button>
      </div>
    `;
    container.appendChild(div);
  });
}

init();
</script>
</body>
</html>
