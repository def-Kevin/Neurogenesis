<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - 书突 Neurogenesis</title>
<script>(function(){try{var t=localStorage.getItem("ng-theme")||(matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t);}catch(e){}})();</script>
<link rel="stylesheet" href="/static/css/style.css?v=2">
</head>
<body>
<div class="auth-page auth-spread">
  <div class="auth-stage">
    <img class="wordmark" src="../assets/seal-logo-wordmark.svg" width="240" height="64" alt="书突 Neurogenesis">
    <div class="divider-brush"></div>
    <div class="quote-carousel">
      <blockquote>
        <p>"无穷的远方，无数的人们，都和我有关。"</p>
        <cite>— 鲁迅</cite>
      </blockquote>
      <blockquote>
        <p>"家人闲坐，灯火可亲。"</p>
        <cite>— 汪曾祺</cite>
      </blockquote>
      <blockquote>
        <p>"我一直认为天堂应该是图书馆的模样。"</p>
        <cite>— 博尔赫斯</cite>
      </blockquote>
      <blockquote>
        <p>"生命是一袭华美的袍，爬满了蚤子。"</p>
        <cite>— 张爱玲</cite>
      </blockquote>
      <blockquote>
        <p>"经典是那些你经常听人家说'我正在重读'而不是'我正在读'的书。"</p>
        <cite>— 卡尔维诺</cite>
      </blockquote>
    </div>
  </div>
  <div class="auth-form">
    <div class="auth-form-inner">
      <img class="seal-mobile" src="../assets/seal-logo.svg" width="64" height="64" alt="书突">
      <h1>欢迎回来</h1>
      <p class="subtitle">文艺内容分享与 AI 分身社区</p>
      <div class="auth-tabs">
        <button class="active" id="tab-login" onclick="switchTab('login')">登录</button>
        <button id="tab-register" onclick="switchTab('register')">注册</button>
      </div>
      <form id="form-login" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>用户名</label>
          <input type="text" id="login-username" required placeholder="请输入用户名" class="input-ui">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="login-password" required placeholder="请输入密码" class="input-ui">
        </div>
        <button type="submit" class="btn">登录</button>
        <div class="error-msg" id="login-error"></div>
      </form>
      <form id="form-register" onsubmit="handleRegister(event)" style="display:none">
        <div class="form-group">
          <label>用户名</label>
          <input type="text" id="reg-username" required minlength="3" placeholder="至少 3 个字符" class="input-ui">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="reg-password" required minlength="6" placeholder="至少 6 个字符" class="input-ui">
        </div>
        <div class="form-group">
          <label>昵称</label>
          <input type="text" id="reg-nickname" placeholder="选填，展示在社区中" class="input-ui">
        </div>
        <button type="submit" class="btn">注册</button>
        <div class="error-msg" id="reg-error"></div>
      </form>
    </div>
  </div>
</div>
<script src="/static/js/api.js"></script>
<script>
function switchTab(tab) {
  document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('form-register').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('tab-login').className = tab === 'login' ? 'active' : '';
  document.getElementById('tab-register').className = tab === 'register' ? 'active' : '';
}
async function handleLogin(e) {
  e.preventDefault();
  const errorEl = document.getElementById('login-error');
  errorEl.textContent = '';
  try {
    await post('/api/auth/login', {
      username: document.getElementById('login-username').value,
      password: document.getElementById('login-password').value,
    });
    location.href = '/static/pages/chat.html';
  } catch (err) {
    errorEl.textContent = err.message || '登录失败';
  }
}
async function handleRegister(e) {
  e.preventDefault();
  const errorEl = document.getElementById('reg-error');
  errorEl.textContent = '';
  try {
    await post('/api/auth/register', {
      username: document.getElementById('reg-username').value,
      password: document.getElementById('reg-password').value,
      nickname: document.getElementById('reg-nickname').value || undefined,
    });
    location.href = '/static/pages/chat.html';
  } catch (err) {
    errorEl.textContent = err.message || '注册失败';
  }
}
</script>
</body>
</html>
