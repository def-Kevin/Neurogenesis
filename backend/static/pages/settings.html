<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>用户设置 - 书突 Neurogenesis</title>
<script>(function(){try{var t=localStorage.getItem("ng-theme")||(matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t);}catch(e){}})();</script>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body data-page="settings">
<div id="nav-root"></div>
<div class="container">
  <div class="page-header">
    <h1>用户设置</h1>
    <p>管理你的个人资料和账户信息</p>
  </div>
  <div class="post-card" style="max-width:520px;">
    <div style="margin-bottom:24px;">
      <label style="display:block;font-size:14px;font-weight:600;margin-bottom:8px;">头像</label>
      <div style="display:flex;align-items:center;gap:16px;">
        <img id="avatar-preview" src="" alt="" style="width:64px;height:64px;border-radius:50%;object-fit:cover;background:var(--primary-light);display:none;">
        <div id="avatar-placeholder" style="width:64px;height:64px;border-radius:50%;background:var(--primary-light);display:flex;align-items:center;justify-content:center;color:var(--primary);font-size:28px;">
          <i class="ph ph-user"></i>
        </div>
        <input type="file" id="avatar-file" accept="image/*" style="display:none;" onchange="uploadAvatar(this)">
        <button class="btn-small" onclick="document.getElementById('avatar-file').click()">上传头像</button>
      </div>
    </div>
    <div style="margin-bottom:24px;">
      <label style="display:block;font-size:14px;font-weight:600;margin-bottom:8px;">昵称</label>
      <input type="text" id="nickname" class="text-sm" style="width:100%;padding:10px 14px;" placeholder="你的昵称">
    </div>
    <div style="margin-bottom:24px;">
      <label style="display:block;font-size:14px;font-weight:600;margin-bottom:8px;">当前密码</label>
      <input type="password" id="current-password" class="text-sm" style="width:100%;padding:10px 14px;" placeholder="修改密码时需要填写">
    </div>
    <div style="margin-bottom:24px;">
      <label style="display:block;font-size:14px;font-weight:600;margin-bottom:8px;">新密码</label>
      <input type="password" id="new-password" class="text-sm" style="width:100%;padding:10px 14px;" placeholder="留空表示不修改">
    </div>
    <div style="display:flex;gap:12px;">
      <button class="btn-small primary" onclick="saveSettings()">保存修改</button>
      <button class="btn-small" onclick="location.href='/static/pages/community.html'">返回社区</button>
    </div>
  </div>
</div>
<script src="/static/js/api.js"></script>
<script src="/static/js/auth.js"></script>
<script src="/static/js/ui.js"></script>
<script>
async function init() {
  const user = await getMe();
  if (!user) return;
  document.getElementById('nickname').value = user.nickname || '';
  if (user.avatar_url) {
    const img = document.getElementById('avatar-preview');
    img.src = user.avatar_url;
    img.style.display = 'block';
    document.getElementById('avatar-placeholder').style.display = 'none';
  }
}

async function uploadAvatar(input) {
  const file = input.files[0];
  if (!file) return;
  const formData = new FormData();
  formData.append('file', file);
  try {
    const res = await fetch('/api/auth/upload-avatar', {
      method: 'POST',
      credentials: 'same-origin',
      body: formData,
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || '上传失败');
    const img = document.getElementById('avatar-preview');
    img.src = data.avatar_url;
    img.style.display = 'block';
    document.getElementById('avatar-placeholder').style.display = 'none';
    showToast('头像上传成功', 'success');
  } catch (err) {
    showToast(err.message, 'error');
  }
}

async function saveSettings() {
  const nickname = document.getElementById('nickname').value.trim();
  const currentPassword = document.getElementById('current-password').value;
  const newPassword = document.getElementById('new-password').value;
  const img = document.getElementById('avatar-preview');
  const avatarUrl = img.style.display !== 'none' ? img.src : null;

  const payload = {};
  if (nickname) payload.nickname = nickname;
  if (avatarUrl) payload.avatar_url = avatarUrl;
  if (newPassword) {
    if (!currentPassword) {
      showToast('修改密码需要提供当前密码', 'error');
      return;
    }
    payload.current_password = currentPassword;
    payload.new_password = newPassword;
  }

  try {
    await put('/api/auth/me', payload);
    showToast('保存成功', 'success');
    document.getElementById('current-password').value = '';
    document.getElementById('new-password').value = '';
    await getMe();
    renderNav();
  } catch (err) {
    showToast('保存失败：' + err.message, 'error');
  }
}

init();
</script>
</body>
</html>
