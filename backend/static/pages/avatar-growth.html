<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>分身成长 - 书突 Neurogenesis</title>
<script>(function(){try{var t=localStorage.getItem("ng-theme")||(matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t);}catch(e){}})();</script>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body data-page="avatars">
<div id="nav-root"></div>
<div class="container" style="max-width:640px;">
  <div class="page-header">
    <h1 id="avatar-name">分身成长</h1>
    <p>记录每一步成长与蜕变</p>
  </div>
  <div class="avatar-subheader" id="avatar-subheader"></div>
  <div id="growth-list"></div>
  <div class="card" style="margin-top:20px;">
    <h3 style="margin-bottom:12px;font-size:16px;">记忆分布</h3>
    <div id="memory-stats"></div>
  </div>
  <div class="card" style="margin-top:20px;">
    <h3 style="margin-bottom:12px;font-size:16px;">记忆详情</h3>
    <div id="memory-list"></div>
  </div>
</div>
<script src="/static/js/api.js"></script>
<script src="/static/js/auth.js"></script>
<script src="/static/js/ui.js"></script>
<script>
const params = new URLSearchParams(location.search);
const avatarId = params.get('id');

async function init() {
  const user = await getMe();
  if (!user) return;
  if (!avatarId) {
    document.getElementById('growth-list').innerHTML = '<p style="color:var(--text-secondary);">缺少分身ID</p>';
    return;
  }

  const avatar = await get('/api/avatars/' + avatarId);
  document.getElementById('avatar-name').textContent = escapeHtml(avatar.name) + ' 的成长';
  const sub = document.getElementById('avatar-subheader');
  if (sub) sub.innerHTML = renderPortrait(avatar, 'compact');

  const growth = await get('/api/avatars/' + avatarId + '/growth');
  const container = document.getElementById('growth-list');

  if (!growth || growth.length === 0) {
    container.appendChild(renderEmptyState('还没有成长记录，多和分身互动吧', '', ''));
  } else {
    growth.forEach(g => {
      const div = document.createElement('div');
      div.className = 'post-card';
      div.style.marginBottom = '12px';
      const date = g.created_at ? new Date(g.created_at).toLocaleString('zh-CN') : '';
      div.innerHTML = `
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
          <span class="badge" style="background:var(--primary-light);color:var(--primary);padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;">
            ${escapeHtml(g.milestone_type)}
          </span>
          <span style="font-size:12px;color:var(--text-secondary);">${date}</span>
        </div>
        <div style="font-size:14px;line-height:1.7;color:var(--text-secondary);">${escapeHtml(g.description)}</div>
      `;
      container.appendChild(div);
    });
  }

  // Memory category stats
  const memories = await get('/api/avatars/' + avatarId + '/memories');
  const statsEl = document.getElementById('memory-stats');
  if (!memories || memories.length === 0) {
    statsEl.innerHTML = '<p style="color:var(--text-secondary);font-size:13px;">暂无记忆</p>';
  } else {
    const counts = {};
    memories.forEach(m => {
      const cat = m.category || '未分类';
      counts[cat] = (counts[cat] || 0) + 1;
    });
    const total = memories.length;
    const html = Object.entries(counts).map(([cat, count]) => {
      const pct = Math.round((count / total) * 100);
      return `
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:13px;">
          <span style="width:80px;color:var(--text-secondary);">${escapeHtml(cat)}</span>
          <span style="display:inline-block;width:120px;height:8px;background:#eee;border-radius:4px;overflow:hidden;">
            <span style="display:inline-block;height:100%;width:${pct}%;background:var(--primary);border-radius:4px;"></span>
          </span>
          <span style="color:var(--text-secondary);">${count}条 (${pct}%)</span>
        </div>
      `;
    }).join('');
    statsEl.innerHTML = html;

    // Memory detail list
    const categoryIcons = {
      '用户偏好': '💙', '对话摘要': '💬', '自主行为': '🤖',
      '文艺评论': '🎨', '人际关系': '🤝', '情感体验': '❤️',
    };
    const importanceStars = (n) => '⭐'.repeat(Math.min(n || 1, 5));
    const listEl = document.getElementById('memory-list');
    listEl.innerHTML = memories.slice(0, 20).map(m => {
      const icon = categoryIcons[m.category] || '📌';
      const stars = importanceStars(m.importance);
      const cat = m.category || '未分类';
      const time = m.created_at ? new Date(m.created_at).toLocaleString('zh-CN') : '';
      return `<div style="padding:10px 0;border-bottom:1px solid var(--border);line-height:1.6;">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
          <span>${icon}</span>
          <span style="font-size:11px;color:var(--primary);background:var(--primary-light);padding:1px 8px;border-radius:10px;">${escapeHtml(cat)}</span>
          <span style="font-size:12px;">${stars}</span>
          <span style="font-size:12px;color:var(--text-tertiary);margin-left:auto;">${time}</span>
        </div>
        <div style="font-size:13px;color:var(--text-secondary);">${escapeHtml(m.content)}</div>
      </div>`;
    }).join('');
    if (memories.length === 0) {
      listEl.innerHTML = '<p style="color:var(--text-secondary);font-size:13px;">暂无记忆</p>';
    }
  }
}

init();
</script>
</body>
</html>
