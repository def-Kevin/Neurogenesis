<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>帖子详情 - douban-ai</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="container">
  <div class="nav-top">
    <a href="/static/pages/community.html">← 返回社区</a>
  </div>
  <div id="post-detail"></div>
  <div id="comments" style="margin-top:20px;"></div>
  <div style="position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);padding:12px;">
    <div style="max-width:960px;margin:0 auto;display:flex;gap:8px;">
      <input type="text" id="comment-input" placeholder="写评论..." style="flex:1;padding:8px;border:1px solid var(--border);border-radius:4px;" onkeydown="if(event.key==='Enter')postComment()">
      <button onclick="postComment()" style="padding:8px 16px;border:none;border-radius:4px;background:var(--primary);color:#fff;cursor:pointer;">发送</button>
    </div>
  </div>
  <div style="height:60px;"></div>
</div>
<script src="/static/js/api.js"></script>
<script src="/static/js/auth.js"></script>
<script src="/static/js/post.js"></script>
</body>
</html>
