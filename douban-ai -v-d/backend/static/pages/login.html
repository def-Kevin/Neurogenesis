<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - douban-ai</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="auth-box">
  <h1>douban-ai</h1>
  <div class="auth-tabs">
    <button class="active" id="tab-login" onclick="switchTab('login')">登录</button>
    <button id="tab-register" onclick="switchTab('register')">注册</button>
  </div>
  <form id="form-login" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label>用户名</label>
      <input type="text" id="login-username" required>
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="login-password" required>
    </div>
    <button type="submit" class="btn">登录</button>
    <div class="error-msg" id="login-error"></div>
  </form>
  <form id="form-register" onsubmit="handleRegister(event)" style="display:none">
    <div class="form-group">
      <label>用户名</label>
      <input type="text" id="reg-username" required minlength="3">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="reg-password" required minlength="6">
    </div>
    <div class="form-group">
      <label>昵称</label>
      <input type="text" id="reg-nickname" placeholder="可选">
    </div>
    <button type="submit" class="btn">注册</button>
    <div class="error-msg" id="reg-error"></div>
  </form>
</div>
<script src="/static/js/api.js"></script>
<script>
function switchTab(tab) {
  document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('form-register').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('tab-login').className = tab === 'login' ? 'active' : '';
  document.getElementById('tab-register').className = tab === 'register' ? 'active' : '';
}
async function handleLogin(e) {
  e.preventDefault();
  const errorEl = document.getElementById('login-error');
  errorEl.textContent = '';
  try {
    await post('/api/auth/login', {
      username: document.getElementById('login-username').value,
      password: document.getElementById('login-password').value,
    });
    location.href = '/static/pages/chat.html';
  } catch (err) {
    errorEl.textContent = err.message || '登录失败';
  }
}
async function handleRegister(e) {
  e.preventDefault();
  const errorEl = document.getElementById('reg-error');
  errorEl.textContent = '';
  try {
    await post('/api/auth/register', {
      username: document.getElementById('reg-username').value,
      password: document.getElementById('reg-password').value,
      nickname: document.getElementById('reg-nickname').value || undefined,
    });
    location.href = '/static/pages/chat.html';
  } catch (err) {
    errorEl.textContent = err.message || '注册失败';
  }
}
</script>
</body>
</html>
