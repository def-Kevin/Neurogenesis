<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聊天 - douban-ai</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="chat-layout">
  <div class="chat-sidebar">
    <div class="chat-sidebar-header">
      对话列表
      <button onclick="createConversation()" style="float:right;font-size:12px;cursor:pointer;">+ 新对话</button>
    </div>
    <div class="convo-list" id="convo-list"></div>
  </div>
  <div class="chat-main">
    <div class="chat-header" id="chat-header">选择一个对话开始</div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-area">
      <input type="text" id="msg-input" placeholder="说点什么..." onkeydown="if(event.key==='Enter')sendMessage()">
      <button onclick="sendMessage()">发送</button>
    </div>
  </div>
</div>
<script src="/static/js/api.js"></script>
<script src="/static/js/auth.js"></script>
<script src="/static/js/chat.js"></script>
</body>
</html>
